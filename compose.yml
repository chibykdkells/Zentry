services:
  postgres:
    image: postgres:16-alpine
    container_name: zendocx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zendocx_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - zendocx-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zendocx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - zendocx-redis-data:/data

volumes:
  zendocx-postgres-data:
  zendocx-redis-data:
